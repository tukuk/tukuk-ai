name: tukuk-agent-pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m compileall agent mcp_server security
      - name: Security diagnostic
        run: python security/diagnostic.py --url https://example.com --output diagnostic-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: diagnostic-report
          path: diagnostic-report.json

  container:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker compose build
      - name: Run container smoke test
        run: docker compose run --rm agent python -m agent.main --self-test
