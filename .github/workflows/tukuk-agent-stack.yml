name: tukuk-agent-stack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-stack
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall agent mcp_server security cli.py
      - name: Kilo-Free CLI smoke test
        run: |
          python cli.py kilo
          python cli.py pipeline --url https://example.com
          python cli.py web
      - name: Build Docker image
        run: docker compose build
